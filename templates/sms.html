<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="auth-token" content="{{AUTH_TOKEN}}">
  <title>SMS — PropPilot</title>
  <style>
    :root {
      --bg-primary:      #ffffff;
      --bg-secondary:    #f7f8fa;
      --bg-tertiary:     #ebeef2;
      --text-primary:    #1a1d21;
      --text-secondary:  #616a73;
      --text-tertiary:   #9aa3ad;
      --border:          #e1e4e8;
      --accent:          #4a6cf7;
      --accent-hover:    #3b5ce6;
      --unread-badge:    #e02020;
      --bubble-incoming: #f0f2f5;
      --bubble-outgoing: #4a6cf7;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-primary);
      background: var(--bg-primary);
    }

    /* ── App shell ───────────────────────────────────────────────────────── */
    .app { display: flex; flex-direction: column; height: 100vh; }

    /* ── Header ──────────────────────────────────────────────────────────── */
    .hdr {
      height: 60px;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      flex-shrink: 0;
    }
    .hdr-back {
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 13.5px;
      padding: 6px 10px;
      border-radius: 6px;
      transition: background .12s;
      white-space: nowrap;
    }
    .hdr-back:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .hdr-title { font-weight: 700; font-size: 15px; flex: 1; text-align: center; }
    .hdr-user  { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }

    /* ── Main layout ─────────────────────────────────────────────────────── */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── Threads panel ───────────────────────────────────────────────────── */
    .threads-panel {
      width: 320px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-secondary);
    }
    .search-wrap {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .search-wrap input {
      width: 100%;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--bg-primary);
      font-size: 13px;
      outline: none;
      color: var(--text-primary);
      transition: border-color .12s;
    }
    .search-wrap input:focus { border-color: var(--accent); }

    .threads-list { flex: 1; overflow-y: auto; padding: 6px; }

    .empty-msg {
      padding: 28px 12px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 13px;
    }

    /* ── Thread card ─────────────────────────────────────────────────────── */
    .thread-card {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background .12s;
      margin-bottom: 2px;
      position: relative;
    }
    .thread-card:hover  { background: var(--bg-tertiary); }
    .thread-card.active { background: var(--bg-tertiary); }

    .tc-row1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2px;
    }
    .tc-name {
      font-weight: 600;
      font-size: 13.5px;
      color: var(--text-primary);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tc-badge {
      background: var(--unread-badge);
      color: white;
      font-size: 11px;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      flex-shrink: 0;
      margin-left: 6px;
    }
    .tc-preview {
      font-size: 12.5px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .tc-time  { font-size: 11px; color: var(--text-tertiary); }
    .tc-extra { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }

    /* ── Conversation panel ──────────────────────────────────────────────── */
    .conv-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .conv-hdr {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 64px;
      display: flex;
      align-items: center;
    }
    .conv-hdr-name  { font-weight: 600; font-size: 15px; color: var(--text-primary); }
    .conv-hdr-phone { font-size: 12.5px; color: var(--text-secondary); margin-top: 1px; }
    .conv-hdr-extra { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }

    .conv-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      font-size: 15px;
    }

    /* Messages area — hidden until a thread is selected */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: none;       /* shown via JS */
      flex-direction: column;
      gap: 3px;
    }

    /* ── Bubbles ─────────────────────────────────────────────────────────── */
    .msg-row { display: flex; margin-bottom: 3px; }
    .msg-in  { justify-content: flex-start; }
    .msg-out { justify-content: flex-end; }

    .bubble {
      max-width: 70%;
      padding: 8px 12px;
      word-break: break-word;
    }
    .msg-in  .bubble {
      background: var(--bubble-incoming);
      color: var(--text-primary);
      border-radius: 12px 12px 12px 3px;
    }
    .msg-out .bubble {
      background: var(--bubble-outgoing);
      color: #ffffff;
      border-radius: 12px 12px 3px 12px;
    }
    .bubble-text { font-size: 13.5px; line-height: 1.45; }
    .bubble-meta { font-size: 11px; text-align: right; margin-top: 3px; opacity: 0.65; }

    /* ── Compose area ────────────────────────────────────────────────────── */
    .compose {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: none;        /* shown via JS */
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
      background: var(--bg-secondary);
    }
    .compose textarea {
      flex: 1;
      height: 60px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13.5px;
      font-family: inherit;
      resize: vertical;
      outline: none;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.45;
      transition: border-color .12s;
    }
    .compose textarea:focus { border-color: var(--accent); }

    .send-btn {
      padding: 8px 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13.5px;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      height: 36px;
      align-self: flex-end;
      transition: background .12s;
    }
    .send-btn:hover:not(:disabled) { background: var(--accent-hover); }
    .send-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    /* ── Status bar ──────────────────────────────────────────────────────── */
    .status-bar {
      display: none;
      padding: 6px 16px;
      background: #fffbeb;
      border-top: 1px solid #fcd34d;
      font-size: 12px;
      color: #92400e;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ── Toasts ──────────────────────────────────────────────────────────── */
    .toasts {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 13px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .12);
      animation: fadein .2s ease;
      pointer-events: all;
    }
    .toast-error { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; }
    .toast-info  { background: #e0f2fe; color: #0369a1; border: 1px solid #7dd3fc; }
    @keyframes fadein {
      from { opacity: 0; transform: translateX(16px); }
      to   { opacity: 1; transform: none; }
    }

    /* ── Scrollbars ──────────────────────────────────────────────────────── */
    .threads-list::-webkit-scrollbar,
    .messages::-webkit-scrollbar      { width: 5px; }
    .threads-list::-webkit-scrollbar-track,
    .messages::-webkit-scrollbar-track { background: transparent; }
    .threads-list::-webkit-scrollbar-thumb,
    .messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    /* ── Bouton retour liste (mobile only) ───────────────────────────────── */
    .btn-back-list {
      display: none;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: var(--accent);
      font-size: 22px;
      padding: 0 12px 0 0;
      cursor: pointer;
      flex-shrink: 0;
      line-height: 1;
    }

    /* ── Mobile : single-pane ────────────────────────────────────────────── */
    @media (max-width: 768px) {
      /* Sidebar plein écran */
      .threads-panel {
        width: 100%;
        border-right: none;
      }

      /* Panneau conversation : hors écran à droite par défaut */
      .conv-panel {
        position: fixed;
        inset: 0;
        height: 100dvh;
        background: var(--bg-primary);
        z-index: 10;
        transform: translateX(100%);
        transition: transform 0.25s ease;
      }

      /* Quand une conv est ouverte : slide-in */
      .main.conv-open .conv-panel {
        transform: translateX(0);
      }

      /* Bouton retour liste visible sur mobile */
      .btn-back-list {
        display: flex;
      }

      /* Zone saisie : padding iPhone notch */
      .compose {
        padding-bottom: max(10px, env(safe-area-inset-bottom));
      }

      /* Toasts repositionnés pour ne pas chevaucher le clavier */
      .toasts {
        bottom: 80px;
      }
    }
  </style>
</head>
<body>

<div class="app">
  <header class="hdr">
    <a href="{{DASHBOARD_URL}}" class="hdr-back">&#8592; Retour Dashboard</a>
    <span class="hdr-title">PropPilot — Messages</span>
    <span class="hdr-user" id="hdr-user"></span>
  </header>

  <div class="main">
    <!-- ── Left: thread list ──────────────────────────────────────────────── -->
    <aside class="threads-panel">
      <div class="search-wrap">
        <input type="search" id="search-input" placeholder="🔍 Rechercher…" autocomplete="off">
      </div>
      <div class="threads-list" id="threads-list">
        <p class="empty-msg">Chargement…</p>
      </div>
    </aside>

    <!-- ── Right: conversation ───────────────────────────────────────────── -->
    <section class="conv-panel">
      <div class="conv-hdr" id="conv-hdr"></div>
      <div class="conv-empty" id="conv-empty"><span>👈 Sélectionnez une conversation</span></div>
      <div class="messages"  id="messages"></div>
      <div class="compose"   id="compose">
        <textarea id="msg-input" placeholder="Tapez votre message… (Ctrl+Entrée pour envoyer)"></textarea>
        <button class="send-btn" id="send-btn">📤 Envoyer</button>
      </div>
      <div class="status-bar" id="status-bar">
        <span id="status-text"></span>
      </div>
    </section>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
(function () {
  'use strict';

  /* ═══════════════════════════════════════════════════════════════════════
     TOKEN
  ═══════════════════════════════════════════════════════════════════════ */
  var metaToken = document.querySelector('meta[name="auth-token"]');
  var TOKEN = metaToken ? metaToken.getAttribute('content') : '';
  // Si le token est vide ou n'a pas été remplacé par le backend, afficher un message d'erreur au lieu de rediriger
  if (!TOKEN || TOKEN === '{{AUTH_TOKEN}}') {
    document.body.innerHTML = '<div style="padding:40px; text-align:center; font-family:sans-serif;"><h1>Session invalide</h1><p>Veuillez vous reconnecter depuis le dashboard.</p><p><a href="{{DASHBOARD_URL}}">Retour</a></p></div>';
    return;
  }

  /* ═══════════════════════════════════════════════════════════════════════
     STATE
  ═══════════════════════════════════════════════════════════════════════ */
  var currentLeadId  = null;
  var threadsData    = [];
  var renderedMsgIds = new Set ? new Set() : { _m: {}, has: function(k){return !!this._m[k];}, add: function(k){this._m[k]=1;}, clear: function(){this._m={};} };
  var connectionLost = false;
  var retryTimer     = null;
  var retryCount     = 0;

  /* ═══════════════════════════════════════════════════════════════════════
     DOM REFS
  ═══════════════════════════════════════════════════════════════════════ */
  var threadsList = document.getElementById('threads-list');
  var convHdr     = document.getElementById('conv-hdr');
  var convEmpty   = document.getElementById('conv-empty');
  var messagesEl  = document.getElementById('messages');
  var composeEl   = document.getElementById('compose');
  var msgInput    = document.getElementById('msg-input');
  var sendBtn     = document.getElementById('send-btn');
  var searchInput = document.getElementById('search-input');
  var statusBar   = document.getElementById('status-bar');
  var statusText  = document.getElementById('status-text');
  var toastsEl    = document.getElementById('toasts');
  var hdrUser     = document.getElementById('hdr-user');

  /* ═══════════════════════════════════════════════════════════════════════
     API HELPER
  ═══════════════════════════════════════════════════════════════════════ */
  function api(url, opts) {
    opts = opts || {};
    return fetch(url, {
      method:  opts.method  || 'GET',
      headers: Object.assign({ 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' }, opts.headers || {}),
      body:    opts.body    || undefined,
    }).then(function (res) {
      if (res.status === 401) {
        if (!window._authErrorShown) {
          window._authErrorShown = true;
          document.body.innerHTML = '<div style="padding:40px; text-align:center; font-family:sans-serif;"><h1>Session expirée</h1><p>Veuillez vous reconnecter depuis le dashboard.</p><p><a href="{{DASHBOARD_URL}}">Retour</a></p></div>';
        }
        return null;
      }
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    });
  }

  /* ═══════════════════════════════════════════════════════════════════════
     HELPERS
  ═══════════════════════════════════════════════════════════════════════ */
  function esc(s) {
    return String(s || '')
      .replace(/&/g,  '&amp;')
      .replace(/</g,  '&lt;')
      .replace(/>/g,  '&gt;')
      .replace(/"/g,  '&quot;');
  }

  function timeAgo(iso) {
    if (!iso) return '';
    var dt  = new Date(iso);
    var now = new Date();
    var sec = Math.floor((now - dt) / 1000);
    if (sec < 60)    return 'à l\'instant';
    if (sec < 3600)  return 'il y a ' + Math.floor(sec / 60) + ' min';
    if (sec < 86400) return 'il y a ' + Math.floor(sec / 3600) + ' h';
    var dtDay  = new Date(dt.getFullYear(),  dt.getMonth(),  dt.getDate());
    var today  = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    var days   = Math.round((today - dtDay) / 86400000);
    var hhmm   = dt.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    if (days === 1) return 'hier ' + hhmm;
    return dt.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' });
  }

  function msgTime(iso) {
    if (!iso) return '';
    var dt  = new Date(iso);
    var now = new Date();
    var hhmm = dt.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    if (dt.toDateString() === now.toDateString()) return hhmm;
    return dt.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' }) + ' ' + hhmm;
  }

  var STATUS_ICONS = { queued: '⏳', sent: '✓', delivered: '✓✓', failed: '❌', undelivered: '❌' };

  /* ═══════════════════════════════════════════════════════════════════════
     THREAD RENDERING
  ═══════════════════════════════════════════════════════════════════════ */
  function threadInnerHTML(t) {
    var name    = esc(((t.prenom || '') + ' ' + (t.nom || '')).trim() || t.telephone || t.lead_id.slice(0, 8));
    var preview = esc((t.dernier_message_role === 'assistant' ? 'Vous: ' : '') + (t.dernier_message || '').slice(0, 60));
    var badge   = t.nb_non_lus > 0 ? '<span class="tc-badge">' + t.nb_non_lus + '</span>' : '';
    var extra   = '';
    var er      = t.extraction_resume;
    if (er) {
      var parts = [];
      if (er.budget)    parts.push('💰 ' + esc(er.budget));
      if (er.type_bien) parts.push('🏠 ' + esc(er.type_bien));
      if (er.zone)      parts.push('📍 ' + esc(er.zone));
      if (parts.length) extra = '<div class="tc-extra">' + parts.join(' · ') + '</div>';
    }
    return '<div class="tc-row1"><span class="tc-name">' + name + '</span>' + badge + '</div>'
         + '<div class="tc-preview">' + preview + '</div>'
         + '<div class="tc-time">'    + timeAgo(t.dernier_message_at) + '</div>'
         + extra;
  }

  function renderThreads() {
    var q        = searchInput.value.toLowerCase().trim();
    var filtered = q
      ? threadsData.filter(function (t) {
          var name = ((t.prenom || '') + ' ' + (t.nom || '')).toLowerCase();
          return name.indexOf(q) !== -1 || (t.telephone || '').indexOf(q) !== -1;
        })
      : threadsData;

    if (!filtered.length) {
      threadsList.innerHTML = '<p class="empty-msg">' + (q ? 'Aucun résultat' : 'Aucune conversation SMS') + '</p>';
      return;
    }

    var prevScroll = threadsList.scrollTop;
    var frag       = document.createDocumentFragment();

    filtered.forEach(function (t) {
      var div = document.createElement('div');
      div.className    = 'thread-card' + (t.lead_id === currentLeadId ? ' active' : '');
      div.dataset.leadId = t.lead_id;
      div.innerHTML    = threadInnerHTML(t);
      div.addEventListener('click', makeSelectHandler(t.lead_id));
      frag.appendChild(div);
    });

    threadsList.innerHTML = '';
    threadsList.appendChild(frag);
    threadsList.scrollTop = prevScroll;
  }

  function makeSelectHandler(leadId) {
    return function () { selectThread(leadId); };
  }

  /* ═══════════════════════════════════════════════════════════════════════
     MESSAGE RENDERING
  ═══════════════════════════════════════════════════════════════════════ */
  function renderMessages(msgs) {
    if (!msgs || !msgs.length) return;
    var appended = false;
    msgs.forEach(function (msg) {
      if (renderedMsgIds.has(msg.id)) return;
      renderedMsgIds.add(msg.id);
      appended = true;

      var isOut      = msg.role === 'assistant';
      var meta       = msg.metadata || {};
      var statusIcon = isOut ? (STATUS_ICONS[meta.status] || '') : '';
      var t          = msgTime(msg.created_at);
      var text       = esc(msg.contenu || '').replace(/\n/g, '<br>');

      var row = document.createElement('div');
      row.className = 'msg-row ' + (isOut ? 'msg-out' : 'msg-in');
      row.id        = 'msg-' + msg.id;
      row.innerHTML = '<div class="bubble">'
                    + '<div class="bubble-text">' + text + '</div>'
                    + '<div class="bubble-meta">'  + t + (statusIcon ? ' ' + statusIcon : '') + '</div>'
                    + '</div>';
      messagesEl.appendChild(row);
    });
    if (appended) messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  /* ═══════════════════════════════════════════════════════════════════════
     SHOW CONVERSATION UI (called on thread open)
  ═══════════════════════════════════════════════════════════════════════ */
  function showConvUI(lead) {
    var name  = esc(((lead.prenom || '') + ' ' + (lead.nom || '')).trim() || lead.telephone || '');
    var phone = esc(lead.telephone || '');
    var extra = '';
    var thread = threadsData.filter(function (t) { return t.lead_id === lead.id; })[0];
    if (thread && thread.extraction_resume) {
      var er    = thread.extraction_resume;
      var parts = [];
      if (er.budget)    parts.push('💰 ' + esc(er.budget));
      if (er.type_bien) parts.push('🏠 ' + esc(er.type_bien));
      if (er.zone)      parts.push('📍 ' + esc(er.zone));
      if (parts.length) extra = '<div class="conv-hdr-extra">' + parts.join(' · ') + '</div>';
    }
    convHdr.innerHTML = '<div>'
                      + '<div class="conv-hdr-name">'  + name  + '</div>'
                      + '<div class="conv-hdr-phone">' + phone + '</div>'
                      + extra
                      + '</div>';
    var backBtn = document.createElement('button');
    backBtn.className = 'btn-back-list';
    backBtn.setAttribute('aria-label', 'Retour à la liste');
    backBtn.textContent = '‹';
    backBtn.onclick = backToList;
    convHdr.insertBefore(backBtn, convHdr.firstChild);
    convEmpty.style.display    = 'none';
    messagesEl.style.display   = 'flex';
    composeEl.style.display    = 'flex';
  }

  /* ═══════════════════════════════════════════════════════════════════════
     SELECT THREAD
  ═══════════════════════════════════════════════════════════════════════ */
  function selectThread(leadId) {
    if (currentLeadId === leadId) return;
    currentLeadId = leadId;
    renderedMsgIds.clear();
    messagesEl.innerHTML = '';

    document.querySelectorAll('.thread-card').forEach(function (el) { el.classList.remove('active'); });
    var card = document.querySelector('[data-lead-id="' + leadId + '"]');
    if (card) card.classList.add('active');

    loadThread(true);
    document.querySelector('.main').classList.add('conv-open');

    /* Mark as read silently */
    api('/api/sms/conversations/' + leadId + '/mark_as_read', { method: 'POST' })
      .then(function () {
        var c = document.querySelector('[data-lead-id="' + leadId + '"]');
        if (c) { var b = c.querySelector('.tc-badge'); if (b) b.remove(); }
        var th = threadsData.filter(function (t) { return t.lead_id === leadId; })[0];
        if (th) th.nb_non_lus = 0;
      })
      .catch(function () {});
  }

  /* ── Retour liste (mobile) ──────────────────────────────────────────────── */
  function backToList() {
    document.querySelector('.main').classList.remove('conv-open');
  }

  /* ═══════════════════════════════════════════════════════════════════════
     FETCH THREADS
  ═══════════════════════════════════════════════════════════════════════ */
  function fetchThreads() {
    return api('/api/sms/conversations')
      .then(function (data) {
        if (!data) return;
        threadsData = data.threads || [];
        renderThreads();
        setOnline(true);
      })
      .catch(function () { setOnline(false); });
  }

  /* ═══════════════════════════════════════════════════════════════════════
     LOAD THREAD MESSAGES
  ═══════════════════════════════════════════════════════════════════════ */
  function loadThread(initial) {
    if (!currentLeadId) return Promise.resolve();
    return api('/api/leads/' + currentLeadId + '/conversations')
      .then(function (data) {
        if (!data) return;
        if (initial && data.lead) showConvUI(data.lead);
        renderMessages(data.messages || []);
        setOnline(true);
      })
      .catch(function () { setOnline(false); });
  }

  /* ═══════════════════════════════════════════════════════════════════════
     SEND SMS
  ═══════════════════════════════════════════════════════════════════════ */
  function sendSMS() {
    var body = msgInput.value.trim();
    if (!body || !currentLeadId) return;

    sendBtn.disabled    = true;
    sendBtn.textContent = '⏳';

    api('/api/sms/send', {
      method: 'POST',
      body:   JSON.stringify({ lead_id: currentLeadId, body: body }),
    })
    .then(function (data) {
      if (data && data.ok) {
        msgInput.value = '';
        /* Optimistic rendering */
        renderMessages([{
          id:         data.conversation_id || 'tmp-' + Date.now(),
          role:       'assistant',
          contenu:    body,
          created_at: new Date().toISOString(),
          metadata:   { status: data.status || 'sent' },
        }]);
        fetchThreads();
      }
    })
    .catch(function (e) {
      toast('❌ Erreur d\'envoi : ' + e.message, 'error');
    })
    .finally(function () {
      sendBtn.disabled    = false;
      sendBtn.textContent = '📤 Envoyer';
    });
  }

  /* Promise.prototype.finally polyfill for older browsers */
  if (!Promise.prototype.finally) {
    Promise.prototype.finally = function (fn) {
      return this.then(function (v) { fn(); return v; }, function (e) { fn(); throw e; });
    };
  }

  /* ═══════════════════════════════════════════════════════════════════════
     TOAST
  ═══════════════════════════════════════════════════════════════════════ */
  function toast(msg, type) {
    type = type || 'info';
    var el = document.createElement('div');
    el.className   = 'toast toast-' + type;
    el.textContent = msg;
    toastsEl.appendChild(el);
    setTimeout(function () { el.remove(); }, 4500);
  }

  /* ═══════════════════════════════════════════════════════════════════════
     ONLINE / OFFLINE
  ═══════════════════════════════════════════════════════════════════════ */
  function setOnline(ok) {
    if (ok && connectionLost) {
      connectionLost          = false;
      statusBar.style.display = 'none';
      if (retryTimer) { clearInterval(retryTimer); retryTimer = null; }

    } else if (!ok && !connectionLost) {
      connectionLost          = true;
      statusBar.style.display = 'flex';
      retryCount              = 5;
      statusText.textContent  = '⚠️ Connexion perdue, nouvelle tentative dans ' + retryCount + ' s';
      retryTimer = setInterval(function () {
        retryCount = Math.max(0, retryCount - 1);
        statusText.textContent = '⚠️ Connexion perdue, nouvelle tentative dans ' + retryCount + ' s';
      }, 1000);
    }
  }

  /* ═══════════════════════════════════════════════════════════════════════
     EVENT LISTENERS
  ═══════════════════════════════════════════════════════════════════════ */
  searchInput.addEventListener('input', renderThreads);

  sendBtn.addEventListener('click', sendSMS);

  msgInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      sendSMS();
    }
  });

  /* ═══════════════════════════════════════════════════════════════════════
     POLLING  — every 5 s, never touches textarea
  ═══════════════════════════════════════════════════════════════════════ */
  setInterval(function () {
    fetchThreads();
    loadThread(false);
  }, 5000);

  /* Refresh relative timestamps in the thread list every minute */
  setInterval(function () {
    document.querySelectorAll('.thread-card').forEach(function (card) {
      var leadId = card.dataset.leadId;
      var th     = threadsData.filter(function (t) { return t.lead_id === leadId; })[0];
      if (!th) return;
      var timeEl = card.querySelector('.tc-time');
      if (timeEl) timeEl.textContent = timeAgo(th.dernier_message_at);
    });
  }, 60000);

  /* ═══════════════════════════════════════════════════════════════════════
     INIT
  ═══════════════════════════════════════════════════════════════════════ */
  (function init() {
    /* Optionally decode JWT for user label (no sensitive verification needed here) */
    try {
      var parts = TOKEN.split('.');
      if (parts.length === 3) {
        var pad = parts[1].replace(/-/g, '+').replace(/_/g, '/');
        var pl  = JSON.parse(atob(pad));
        if (pl.agency_name) hdrUser.textContent = pl.agency_name;
        else if (pl.plan)   hdrUser.textContent = pl.plan;
      }
    } catch (e_) {}

    fetchThreads();
  })();

})();
</script>
</body>
</html>
