<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 172 44" width="172" height="44" role="img" aria-label="PropPilot">
  <defs>
    <linearGradient id="bubble-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A90FF"/>
      <stop offset="100%" stop-color="#1E6BFF"/>
    </linearGradient>
  </defs>
  <!-- Speech bubble icon -->
  <rect x="2" y="2" width="36" height="28" rx="8" ry="8" fill="url(#bubble-grad)"/>
  <!-- Bubble tail -->
  <path d="M10 30 L6 40 L20 30 Z" fill="url(#bubble-grad)"/>
  <!-- P letter -->
  <text x="20" y="22" font-family="Arial Black, Arial, sans-serif" font-size="17" font-weight="900" fill="white" text-anchor="middle">P</text>
  <!-- "Prop" in navy -->
  <text x="48" y="28" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" fill="#0A1F44" letter-spacing="-0.5">Prop</text>
  <!-- "Pilot" in blue -->
  <text x="106" y="28" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" fill="#1E6BFF" letter-spacing="-0.5">Pilot</text>
</svg>
