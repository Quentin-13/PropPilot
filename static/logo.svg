<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 116">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
  </defs>
  <!-- Hexagone pointu haut/bas -->
  <polygon points="50,2 97,27 97,77 50,102 3,77 3,27" fill="url(#g)"/>
  <!-- Trait d'accroche haut-droite (#60a5fa) -->
  <line x1="50" y1="2" x2="97" y2="27" stroke="#60a5fa" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Monogramme PP -->
  <text x="50" y="70"
        font-family="'Arial Black', Arial, Helvetica, sans-serif"
        font-size="40" font-weight="900"
        fill="white" text-anchor="middle"
        letter-spacing="-1">PP</text>
</svg>
